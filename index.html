<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Album d'Amour Secret 💌</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffebee 0%, #f8bbd0 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
      display: none; /* Caché tant qu'on n'est pas logué */
    }
    header {
      background: #ff4081;
      color: white;
      padding: 30px;
      text-align: center;
      position: relative;
    }
    h1 { margin: 0; font-size: 2.4rem; }
    .subtitle { opacity: 0.9; margin-top: 8px; font-size: 1.1rem; }

    .owner-toggle {
      position: absolute;
      top: 16px;
      right: 20px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      width: auto;
      margin-top: 0;
    }
    .owner-toggle.active {
      background: #ffd700;
      color: #7a4f00;
      border-color: #ffd700;
      font-weight: 600;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      padding: 30px;
    }

    .form-section, .list-section {
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 2px solid #ffc1d8;
      border-radius: 12px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    textarea { min-height: 320px; resize: vertical; }

    button {
      background: #ff4081;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.05rem;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    button:hover { background: #f50057; }

    .letter-item {
      padding: 16px;
      border: 2px solid #ffe0e6;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .letter-item:hover {
      background: #fff0f5;
      transform: translateX(6px);
    }
    .letter-date { font-size: 0.85rem; color: #888; }
    .letter-theme { color: #ff4081; font-weight: 600; }
    .letter-likes-badge {
      flex-shrink: 0;
      background: #ffe0e6;
      color: #f50057;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
    }
    .modal-content {
      background: white;
      max-width: 720px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 20px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .delete-btn {
      background: #e63939;
      margin-top: 20px;
    }
    .delete-btn:hover {
      background: #c1121f;
    }
    
    .back-btn {
      background: #757575;
      margin-top: 10px;
    }
    .back-btn:hover {
      background: #424242;
    }

    .like-section {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px solid #ffe0e6;
    }
    .like-btn {
      width: auto;
      display: inline-block;
      padding: 10px 22px;
      font-size: 0.95rem;
    }
    .likes-detail {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #555;
    }
    .likes-detail ul {
      list-style: none;
      padding: 0;
      margin: 8px 0 0 0;
    }
    .likes-detail li {
      padding: 6px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    
    /* Écran de verrouillage */
    .gatekeeper {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: linear-gradient(135deg, #f8bbd0 0%, #ffebee 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .gatekeeper-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
  </style>
</head>
<body>

<div class="gatekeeper" id="auth-gate">
  <div class="gatekeeper-box">
    <h2>Entrée Secrète 🔒</h2>
    <p>Identifie-toi pour lire l'album...</p>
    <input type="text" id="gate-id" placeholder="Ton Identifiant">
    <input type="password" id="gate-mdp" placeholder="Ton Mot de passe">
    <button onclick="tenterConnexionSite()">Entrer 💌</button>
  </div>
</div>

<div class="container" id="site-container">
  <header>
    <button class="owner-toggle" id="owner-toggle-btn" onclick="basculerModeProprietaire()">🔑 Mode propriétaire</button>
    <h1>💌 Mon Album d'Amour</h1>
    <p class="subtitle">Mes lettres secrètes pour toi (Connecté en tant que : <span id="user-display" style="font-weight:bold; color:#0080FF;"></span>)</p>
  </header>

  <div class="main">
    <div class="form-section">
      <h2>Nouvelle Lettre</h2>
      <input type="text" id="titre" placeholder="Titre de la lettre">
      <input type="text" id="theme" placeholder="Sujet / Thème (ex: Premier baiser, Jalousie...)">
      <textarea id="contenu" placeholder="Écris ta lettre ici..."></textarea>
      <button onclick="enregistrerLettre()">💾 Enregistrer la lettre</button>
    </div>

    <div class="list-section">
      <h2>Mes Lettres (<span id="nb-lettres">0</span>)</h2>
      <div id="liste-lettres"></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button onclick="fermerModal()" style="float:right; background:none; border:none; font-size:1.8rem; cursor:pointer; width:auto;">✕</button>

    <h2 id="modal-titre"></h2>
    <p id="modal-theme" style="color:#ff4081; font-weight:600;"></p>
    <p id="modal-date" style="font-size:0.9rem; color:#666;"></p>
    <hr>
    <div id="modal-contenu" style="white-space: pre-wrap; line-height:1.75; font-size:1.05rem;"></div>

    <div class="like-section">
      <button class="like-btn" id="like-btn" onclick="toggleLike()">❤️ J'aime / Je n'aime plus</button>
      <div class="likes-detail" id="likes-detail"></div>
    </div>

    <button onclick="supprimerLettre()" class="delete-btn">🗑️ Supprimer cette lettre</button>
    
    <button onclick="fermerModal()" class="back-btn">⬅️ Retour à la liste</button>
  </div>
</div>

<script>
// ==================== CONFIGURATION ====================
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfOFeJWcX-qF43BXmrLbEerDlOgmpytdu0jL6ag59jHqMjzat3T2bsj9ep5h6LSdPlTw/exec";

// ==================== ÉTAT ====================
let lettreActuelle = null;
let modeProprietaire = false;
let mdpProprietaireValide = null;
let utilisateurConnecte = null; 

// ==================== FONCTION DE CONNEXION ====================
async function tenterConnexionSite() {
  const id = document.getElementById('gate-id').value.trim();
  const mdp = document.getElementById('gate-mdp').value;

  if(!id || !mdp) {
    alert("Remplis les deux cases ! 🧐");
    return;
  }

  try {
    const res = await appelerBackend({
      action: "connexion",
      identifiant: id,
      motDePasse: mdp
    });

    if(res === "ok") {
      utilisateurConnecte = id;
      document.getElementById('user-display').textContent = id;
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('site-container').style.display = 'block';
      chargerLettres();
    } else {
      alert("❌ Identifiant ou mot de passe incorrect.");
    }
  } catch(e) {
    alert("Erreur réseau lors de la connexion");
  }
}

async function appelerBackend(payload) {
  const res = await fetch(GOOGLE_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return (await res.text()).trim();
}

// ==================== LETTRES ====================

async function enregistrerLettre() {
  const titre = document.getElementById('titre').value.trim();
  const theme = document.getElementById('theme').value.trim();
  const contenu = document.getElementById('contenu').value.trim();

  if (!titre || !contenu) {
    alert("Le titre et le contenu sont obligatoires 💕");
    return;
  }

  try {
    const resultat = await appelerBackend({
      action: "ajouter",
      titre: titre,
      theme: theme || "Sans thème",
      contenu: contenu,
      date: new Date().toLocaleString('fr-FR')
    });

    if (resultat.startsWith("Erreur")) {
      alert("❌ " + resultat);
      return;
    }

    alert("💌 Lettre enregistrée !");
    document.getElementById('titre').value = '';
    document.getElementById('theme').value = '';
    document.getElementById('contenu').value = '';
    chargerLettres();
  } catch (e) {
    alert("Erreur lors de l'enregistrement");
  }
}

async function chargerLettres() {
  const liste = document.getElementById('liste-lettres');
  liste.innerHTML = "<p>Chargement...</p>";

  try {
    const response = await fetch(GOOGLE_SCRIPT_URL + '?action=lire');
    const lettres = await response.json();

    document.getElementById('nb-lettres').textContent = lettres.length;

    if (lettres.length === 0) {
      liste.innerHTML = "<p>Aucune lettre pour le moment...</p>";
      return;
    }

    liste.innerHTML = '';
    lettres.reverse().forEach(lettre => {
      const div = document.createElement('div');
      div.className = 'letter-item';
      const nbLikes = (lettre.likes || []).length;
      div.innerHTML = `
        <div>
          <strong>${lettre.titre}</strong><br>
          <span class="letter-theme">${lettre.theme}</span><br>
          <span class="letter-date">${lettre.date}</span>
        </div>
        ${nbLikes > 0 ? `<span class="letter-likes-badge">❤️ ${nbLikes}</span>` : ''}
      `;
      div.onclick = () => afficherLettre(lettre);
      liste.appendChild(div);
    });
  } catch (e) {
    liste.innerHTML = "<p>Impossible de charger les lettres pour le moment.</p>";
  }
}

function afficherLettre(lettre) {
  lettreActuelle = lettre;
  document.getElementById('modal-titre').textContent = lettre.titre;
  document.getElementById('modal-theme').textContent = lettre.theme;
  document.getElementById('modal-date').textContent = lettre.date;
  document.getElementById('modal-contenu').textContent = lettre.contenu;
  afficherLikes();
  document.getElementById('modal').style.display = 'block';
}

function afficherLikes() {
  const likes = lettreActuelle.likes || [];
  const detailDiv = document.getElementById('likes-detail');

  if (modeProprietaire) {
    if (likes.length === 0) {
      detailDiv.innerHTML = "<em>Personne n'a encore aimé cette lettre.</em>";
    } else {
      detailDiv.innerHTML = `<strong>${likes.length} j'aime :</strong><ul>${
        likes.map(l => `<li>❤️ <strong>${l.nom}</strong> — le ${l.date}</li>`).join('')
      }</ul>`;
    }
  } else {
    detailDiv.innerHTML = likes.length > 0
      ? `❤️ ${likes.length} personne(s) ont aimé cette lettre`
      : '';
  }
}

async function supprimerLettre() {
  if (!lettreActuelle) return;
  if (!confirm("❗ Voulez-vous vraiment supprimer cette lettre définitivement ?")) {
    return;
  }

  const mdp = mdpProprietaireValide || prompt("Mot de passe propriétaire pour confirmer la suppression :");
  if (!mdp) return;

  try {
    const resultat = await appelerBackend({
      action: "supprimer",
      id: lettreActuelle.id,
      motDePasse: mdp
    });

    if (resultat.startsWith("Erreur")) {
      alert("❌ " + resultat);
      return;
    }

    alert("🗑️ Lettre supprimée avec succès !");
    fermerModal();
    chargerLettres();
    
  } catch (e) {
    alert("Erreur lors de la suppression");
  }
}

function fermerModal() {
  document.getElementById('modal').style.display = 'none';
  lettreActuelle = null;
}

// ==================== LIKES SIMPLIFIÉS ====================
async function toggleLike() {
  if (!lettreActuelle) return;
  
  try {
    const resultat = await appelerBackend({
      action: "aimer",
      id: lettreActuelle.id,
      utilisateur: utilisateurConnecte 
    });

    if (resultat.startsWith("Erreur")) {
      alert("❌ " + resultat);
      return;
    }

    const response = await fetch(GOOGLE_SCRIPT_URL + '?action=lire');
    const lettres = await response.json();
    const miseAJour = lettres.find(l => l.id === lettreActuelle.id);
    if (miseAJour) {
      lettreActuelle = miseAJour;
      afficherLikes();
    }
    chargerLettres();
  } catch (e) {
    alert("Erreur lors du like");
  }
}

// ==================== MODE PROPRIÉTAIRE ====================
async function basculerModeProprietaire() {
  if (modeProprietaire) {
    modeProprietaire = false;
    mdpProprietaireValide = null;
    document.getElementById('owner-toggle-btn').classList.remove('active');
    document.getElementById('owner-toggle-btn').textContent = "🔑 Mode propriétaire";
    if (lettreActuelle) afficherLikes();
    return;
  }

  const mdp = prompt("Mot de passe propriétaire :");
  if (!mdp) return;

  try {
    const resultat = await appelerBackend({ action: "verifier", motDePasse: mdp });
    if (resultat !== "ok") {
      alert("❌ Mot de passe incorrect");
      return;
    }
    modeProprietaire = true;
    mdpProprietaireValide = mdp;
    document.getElementById('owner-toggle-btn').classList.add('active');
    document.getElementById('owner-toggle-btn').textContent = "👑 Mode propriétaire actif";
    if (lettreActuelle) afficherLikes();
  } catch (e) {
    alert("Erreur de verification");
  }
}
</script>

</body>
</html>
